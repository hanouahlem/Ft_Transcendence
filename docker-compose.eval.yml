services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./backend/.env.eval
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: always
    env_file:
      - ./backend/.env.eval
    environment:
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: https://localhost:4433/api
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://localhost:4433/api
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "4433:443"
    volumes:
      - ./other/nginx/eval.conf:/etc/nginx/conf.d/default.conf:ro
      - ./other/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  uploads_data:
