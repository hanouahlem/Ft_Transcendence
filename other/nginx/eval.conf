map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:3001;
}

server {
  listen 443 ssl;
  server_name localhost;
  client_max_body_size 10m;

  ssl_certificate /etc/nginx/certs/eval.crt;
  ssl_certificate_key /etc/nginx/certs/eval.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;

  location = /auth/github/callback {
    proxy_pass http://backend_upstream;
  }

  location = /auth/github {
    proxy_pass http://backend_upstream;
  }

  location = /auth/42/callback {
    proxy_pass http://backend_upstream;
  }

  location = /auth/42 {
    proxy_pass http://backend_upstream;
  }

  location = /auth/github/handoff {
    proxy_pass http://frontend_upstream;
  }

  location = /auth/42/handoff {
    proxy_pass http://frontend_upstream;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend_upstream;
  }

  location /uploads/ {
    proxy_pass http://backend_upstream;
  }

  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://backend_upstream;
  }

  location / {
    proxy_pass http://frontend_upstream;
  }
}
